{{- if and .Values.injector.enabled (not .Values.webhook.caBundle) }}
# Pre-install hook: generates a self-signed CA and serving cert, writes them
# to the TLS Secret so the injector deployment can start with valid TLS.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-koshi-cert-gen
  labels:
    app: koshi-injector
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: koshi-cert-gen
    spec:
      serviceAccountName: {{ .Release.Name }}-koshi-cert-gen
      restartPolicy: Never
      containers:
        - name: cert-gen
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/koshi"]
          env:
            - name: KOSHI_ROLE
              value: "certgen-secret"
            - name: KOSHI_SERVICE_NAME
              value: {{ .Release.Name }}-koshi-webhook
            - name: KOSHI_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: KOSHI_SECRET_NAME
              value: {{ .Release.Name }}-koshi-webhook-tls
---
# Post-install hook: patches caBundle on the MutatingWebhookConfiguration
# after it has been created as a regular Helm-managed manifest.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-koshi-cert-cabundle
  labels:
    app: koshi-injector
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: koshi-cert-cabundle
    spec:
      serviceAccountName: {{ .Release.Name }}-koshi-cert-gen
      restartPolicy: Never
      containers:
        - name: cert-cabundle
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/koshi"]
          env:
            - name: KOSHI_ROLE
              value: "certgen-cabundle"
            - name: KOSHI_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: KOSHI_SECRET_NAME
              value: {{ .Release.Name }}-koshi-webhook-tls
            - name: KOSHI_WEBHOOK_NAME
              value: {{ .Release.Name }}-koshi-injector
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-koshi-cert-gen
  labels:
    app: koshi-injector
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-koshi-cert-gen
  labels:
    app: koshi-injector
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-koshi-cert-gen
  labels:
    app: koshi-injector
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-koshi-cert-gen
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-koshi-cert-gen
    namespace: {{ .Release.Namespace }}
{{- end }}

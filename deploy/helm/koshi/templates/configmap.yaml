apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-koshi-config
data:
  config.yaml: |
    {{- if eq .Values.mode "listener" }}
    mode:
      type: "listener"

    upstreams:
      openai: "https://api.openai.com"
      anthropic: "https://api.anthropic.com"

    default_policy:
      id: "_listener_default"
      budgets:
        rolling_tokens:
          window_seconds: 3600
          limit_tokens: 1000000
          burst_tokens: 0
      guards:
        max_tokens_per_request: 32768
      decision_tiers:
        tier1_auto:
          action: "throttle"
    {{- else }}
    upstreams:
      openai: "https://api.openai.com"
      # anthropic: "https://api.anthropic.com"

    workloads:
      - id: "example-agent"
        type: "agent"
        owner_team: "ml-team"
        environment: "production"
        identity:
          mode: "header"
          key: "x-genops-workload-id"
        model_targets:
          - provider: "openai"
            model: "gpt-4"
        policy_refs:
          - "standard"

    policies:
      - id: "standard"
        budgets:
          rolling_tokens:
            window_seconds: 300
            limit_tokens: 100000
            burst_tokens: 10000
        guards:
          max_tokens_per_request: 4096
        decision_tiers:
          tier1_auto:
            action: "throttle"
          tier3_platform:
            action: "kill_workload"
    {{- end }}

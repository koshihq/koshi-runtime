apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-koshi-config
data:
  config.yaml: |
    {{- if eq .Values.mode "listener" }}
    mode:
      type: "listener"

    listen_addr: ":15080"

    upstreams:
      {{- range $provider, $url := .Values.config.upstreams }}
      {{ $provider }}: {{ $url | quote }}
      {{- end }}

    default_policy:
      id: {{ .Values.config.default_policy.id | quote }}
      budgets:
        rolling_tokens:
          window_seconds: {{ .Values.config.default_policy.budgets.rolling_tokens.window_seconds }}
          limit_tokens: {{ .Values.config.default_policy.budgets.rolling_tokens.limit_tokens }}
          burst_tokens: {{ .Values.config.default_policy.budgets.rolling_tokens.burst_tokens }}
      guards:
        max_tokens_per_request: {{ .Values.config.default_policy.guards.max_tokens_per_request }}
      decision_tiers:
        tier1_auto:
          action: {{ .Values.config.default_policy.decision_tiers.tier1_auto.action | quote }}
    {{- else }}
    # Enforcement-mode config is not yet templated from values.
    # Edit this section directly or override via a custom ConfigMap.
    listen_addr: ":8080"

    upstreams:
      openai: "https://api.openai.com"
      # anthropic: "https://api.anthropic.com"

    workloads:
      - id: "example-agent"
        type: "agent"
        owner_team: "ml-team"
        environment: "production"
        identity:
          mode: "header"
          key: "x-genops-workload-id"
        model_targets:
          - provider: "openai"
            model: "gpt-4"
        policy_refs:
          - "standard"

    policies:
      - id: "standard"
        budgets:
          rolling_tokens:
            window_seconds: 300
            limit_tokens: 100000
            burst_tokens: 10000
        guards:
          max_tokens_per_request: 4096
        decision_tiers:
          tier1_auto:
            action: "throttle"
          tier3_platform:
            action: "kill_workload"
    {{- end }}

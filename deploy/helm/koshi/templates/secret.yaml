{{- if and .Values.injector.enabled .Values.webhook.certPEM .Values.webhook.keyPEM }}
# User-provided webhook TLS certificate.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-koshi-webhook-tls
  labels:
    app: koshi-injector
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.webhook.certPEM | b64enc }}
  tls.key: {{ .Values.webhook.keyPEM | b64enc }}
{{- else if .Values.injector.enabled }}
# Placeholder secret — populated by the cert-gen job.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-koshi-webhook-tls
  labels:
    app: koshi-injector
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
{{- end }}

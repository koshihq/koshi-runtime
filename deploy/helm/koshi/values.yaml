# Default mode: listener (shadow evaluation, no blocking).
# Set to "enforcement" to enable live policy enforcement.
mode: listener

replicaCount: 1

image:
  repository: koshi
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

configPath: /etc/koshi/config.yaml

podSecurityContext:
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 2
  periodSeconds: 5
  failureThreshold: 1

pdb:
  enabled: true
  minAvailable: 1

# --- Injector / Webhook ---

injector:
  enabled: true
  replicaCount: 1
  port: 8443
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

webhook:
  # Safe default: webhook failure does not block pod creation.
  failurePolicy: Ignore
  # Provide caBundle, certPEM, keyPEM to skip auto-generation.
  # caBundle: ""
  # certPEM: ""
  # keyPEM: ""

sidecar:
  port: 15080
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Namespace opt-in label for sidecar injection.
namespaceSelector:
  matchLabels:
    runtime.getkoshi.ai/inject: "true"

networkPolicy:
  enabled: true

# Prometheus scrape annotations applied to injected workload pods.
scrapeAnnotations:
  enabled: true
  keys:
    scrape: "prometheus.io/scrape"
    port: "prometheus.io/port"
    path: "prometheus.io/path"

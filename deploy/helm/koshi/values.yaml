# Default mode: listener (shadow evaluation, no blocking).
# Set to "enforcement" to enable live policy enforcement.
mode: listener

replicaCount: 1

image:
  repository: ghcr.io/koshihq/koshi-runtime
  tag: ""  # Defaults to chart appVersion if empty
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 15080  # NOT YET WIRED — port is derived from mode: 15080 (listener) or 8080 (enforcement).

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

configPath: /etc/koshi/config.yaml

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /healthz
    port: 15080  # NOT YET WIRED — port is derived from mode (same as service port).
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 15080  # NOT YET WIRED — port is derived from mode (same as service port).
  initialDelaySeconds: 2
  periodSeconds: 5
  failureThreshold: 1

pdb:
  enabled: true
  minAvailable: 1

# --- Injector / Webhook ---

injector:
  enabled: true
  replicaCount: 1
  port: 8443
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

webhook:
  # Safe default: webhook failure does not block pod creation.
  failurePolicy: Ignore
  # Provide caBundle, certPEM, keyPEM to skip auto-generation.
  # caBundle: ""
  # certPEM: ""
  # keyPEM: ""

sidecar:
  port: 15080
  # Resources applied to injected sidecar containers.
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Namespace opt-in label for sidecar injection.
namespaceSelector:
  matchLabels:
    runtime.getkoshi.ai/inject: "true"

networkPolicy:
  enabled: true

# Runtime configuration rendered into the control-plane ConfigMap.
# Injected sidecars use the built-in default listener config and are NOT
# affected by these values.
#
# These values are used in listener mode only. Enforcement-mode config
# is currently hardcoded in the ConfigMap template.
config:
  upstreams:
    openai: "https://api.openai.com"
    anthropic: "https://api.anthropic.com"
  default_policy:
    id: "_listener_default"
    budgets:
      rolling_tokens:
        window_seconds: 3600
        limit_tokens: 1000000
        burst_tokens: 0
    guards:
      max_tokens_per_request: 32768
    decision_tiers:
      tier1_auto:
        action: "throttle"

# NOT YET WIRED — Prometheus scrape annotations are applied to injected pods,
# but the annotation keys are currently hardcoded in the injector binary.
# These values are retained for forward compatibility.
scrapeAnnotations:
  enabled: true
  keys:
    scrape: "prometheus.io/scrape"
    port: "prometheus.io/port"
    path: "prometheus.io/path"

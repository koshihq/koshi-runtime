upstreams:
  openai: "https://api.openai.com"
  # anthropic: "https://api.anthropic.com"  # Uncomment if any workload uses provider: "anthropic" (required for Anthropic routing)

# Optional: enable/disable SSE usage extraction (default: true)
# sse_extraction: true

# Optional: reject all unknown workloads regardless of default_policy
# strict_mode: true

# Optional: default policy for unknown workloads (fail-open with budget)
# default_policy:
#   id: "_default"
#   budgets:
#     rolling_tokens:
#       window_seconds: 60
#       limit_tokens: 1000
#       burst_tokens: 0
#   guards:
#     max_tokens_per_request: 1024

# NOTE:
# This example includes one OpenAI workload and one Anthropic workload.
# If you keep the Anthropic workload below, you must uncomment upstreams.anthropic above.
# Otherwise requests routed to Anthropic models will fail with upstream_not_configured.
workloads:
  - id: "customer-support-agent"
    type: "agent"
    owner_team: "cx-team"
    environment: "production"
    identity:
      mode: "header"
      key: "x-genops-workload-id"
    model_targets:
      - provider: "openai"
        model: "gpt-4"
    policy_refs:
      - "standard"

  - id: "content-pipeline"  # Requires upstreams.anthropic to be configured above
    type: "batch"
    owner_team: "content-team"
    environment: "production"
    identity:
      mode: "header"
      key: "x-genops-workload-id"
    model_targets:
      - provider: "anthropic"
        model: "claude-3-opus-20240229"
    policy_refs:
      - "high-throughput"

policies:
  - id: "standard"
    budgets:
      rolling_tokens:
        window_seconds: 300
        limit_tokens: 100000
        burst_tokens: 10000
    guards:
      max_tokens_per_request: 4096
    decision_tiers:
      tier1_auto:
        action: "throttle"
      tier3_platform:
        action: "kill_workload"

  - id: "high-throughput"
    budgets:
      rolling_tokens:
        window_seconds: 600
        limit_tokens: 500000
        burst_tokens: 50000
    guards:
      max_tokens_per_request: 8192
    decision_tiers:
      tier1_auto:
        action: "throttle"
